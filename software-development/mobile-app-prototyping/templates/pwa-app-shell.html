<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="data:image/svg+xml,...">
<title>App Name</title>
<style>
/* === DARK THEME === */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--card:#0d0d0d;--card2:#141414;--border:#1a1a1a;--text:#fff;--text2:#8e8e93;--text3:#636366;--green:#30d158;--orange:#ff9f0a;--teal:#5ac8fa;--red:#ff453a;--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;overflow:hidden;height:100dvh;padding-top:var(--sat);padding-bottom:var(--sab)}

/* === TAB BAR === */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--sab));z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;cursor:pointer}
.tab.active{color:var(--green)}

/* === PAGES === */
.pages{height:calc(100dvh - var(--sat) - var(--sab) - 84px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:20px 20px 100px;min-height:100%}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === CARDS === */
.card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:16px;margin-bottom:14px}

/* === METRICS === */
.metric{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:3px solid}
.metric-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.metric-value{font-size:20px;font-weight:800;margin-top:1px}
.metric-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* === UTILITY === */
.h-title{font-size:28px;font-weight:800;margin-bottom:2px}
.h-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
</style>
</head>
<body>

<div class="pages" id="pages">
  <div class="page active" id="page-dashboard">
    <div class="h-title">Dashboard</div>
    <div class="h-sub">Content goes here</div>
    <div class="card">Card content</div>
    <div class="metric" style="border-color:var(--green)">
      <div class="metric-content">
        <div class="metric-label">Example Metric</div>
        <div class="metric-value" style="color:var(--green)">42.0</div>
        <div class="metric-sub">Description</div>
      </div>
    </div>
  </div>
  <div class="page" id="page-settings">
    <div class="h-title">Settings</div>
    <div class="h-sub">Configuration</div>
    <input type="password" id="tokenInput" placeholder="API token...">
    <button class="save" onclick="saveToken()">Save</button>
  </div>
</div>

<div class="tabbar">
  <button class="tab active" data-page="dashboard" onclick="switchTab('dashboard')">Tab 1</button>
  <button class="tab" data-page="settings" onclick="switchTab('settings')">Settings</button>
</div>

<script>
// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector(`.tab[data-page="${tab}"]`).classList.add('active');
  document.getElementById('pages').scrollTop = 0;
}

// Token management
let token = localStorage.getItem('api_token') || '';
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (t) { localStorage.setItem('api_token', t); token = t; }
}

// Auto-refresh
setInterval(fetchData, 15000);

// Pull to refresh
let startY = 0;
document.getElementById('pages').addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.getElementById('pages').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 100) fetchData();
});

// Data
async function fetchData() {
  if (!token) return;
  try {
    const resp = await fetch(`https://api.example.com/data`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (resp.ok) updateUI(await resp.json());
  } catch {}
}
</script>
</body>
</html>
